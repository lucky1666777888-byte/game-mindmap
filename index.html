<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AI 游戏测试编辑器</title>
  <script>
    // 1. 开启官方预留的“接管模式”
    window.takeOverApp = true;
  </script>
  <link href="dist/css/chunk-vendors.css" rel="stylesheet">
  <link href="dist/css/app.css" rel="stylesheet">
</head>
<body>
  <div id="app"></div>
  <script>
    // 2. 解析 Dify 发来的加密数据
    const getAiData = () => {
      return new Promise((resolve) => {
        const hash = window.location.hash;
        if (hash.includes('data=')) {
          try {
            const b64 = hash.split('data=')[1];
            // 解密并还原中文
            const jsonStr = decodeURIComponent(atob(b64).split('').map(c => 
              '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
            ).join(''));
            resolve(JSON.parse(jsonStr));
            return;
          } catch (e) { console.error("解析失败", e); }
        }
        resolve({ data: { text: "待接入数据" }, children: [] });
      });
    };

    // 3. 注入编辑器的 API（官方提供的接管方法）
    window.onload = async () => {
      const mindMapData = await getAiData();
      window.takeOverAppMethods = {
        getMindMapData: () => mindMapData,
        saveMindMapData: (data) => console.log('已保存:', data),
        getLanguage: () => 'zh-cn'
      };
    };
  </script>
  <script src="dist/js/chunk-vendors.js"></script>
  <script src="dist/js/app.js"></script>
</body>
</html>
