<!DOCTYPE html>
<html lang="">
<head>
  <meta charset="utf-8">
  <link rel="icon" href="dist/logo.ico">
  <title>AI 游戏测试脑图 - 编辑器版</title>
  <script>
    // 核心开关：开启接管模式
    window.takeOverApp = true;
    window.externalPublicPath = './dist/';
  </script>
  <link href="dist/css/chunk-vendors.css" rel="stylesheet">
  <link href="dist/css/app.css" rel="stylesheet">
</head>
<body>
  <div id="app"></div>
  <script>
    // 1. 拆快递逻辑：解析 Dify 发来的数据
    const getAiData = () => {
      const hash = window.location.hash;
      if (hash && hash.includes('data=')) {
        try {
          const b64 = hash.split('data=')[1];
          const jsonStr = decodeURIComponent(atob(b64).split('').map(c => 
            '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
          ).join(''));
          return JSON.parse(jsonStr);
        } catch (e) { console.error("解析失败", e); }
      }
      return { data: { text: "请从 Dify 发送数据" }, children: [] };
    }

    // 2. 注入官方 API：这是文档里提到的接管方法
    window.onload = () => {
      const mindMapData = getAiData();
      window.takeOverAppMethods = {
        getMindMapData: () => mindMapData, // 喂入 AI 脑图数据
        saveMindMapData: (data) => { console.log('已手动修改数据:', data) },
        getLanguage: () => 'zh-cn',
        getLocalConfig: () => null,
        getMindMapConfig: () => ({ theme: 'dark' }) // 默认暗色皮肤
      };
    };
  </script>
  <script src="dist/js/chunk-vendors.js"></script>
  <script src="dist/js/app.js"></script>
</body>
</html>
