<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI 游戏测试脑图 - 专业版</title>
  <link rel="stylesheet" href="https://unpkg.com/simple-mind-map/dist/style.css">
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background-color: #1a1a1a; }
    #mindMapContainer { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="mindMapContainer"></div>
  <script type="module">
    import MindMap from 'https://unpkg.com/simple-mind-map/dist/index.esm.js';
    import Menu from 'https://unpkg.com/simple-mind-map/dist/menu.esm.js';
    
    // 启用右键菜单，支持编辑、删除、新增
    MindMap.usePlugin(Menu);

    function getDifyData() {
      const hash = window.location.hash;
      if (hash && hash.includes('data=')) {
        try {
          const b64 = hash.split('data=')[1];
          // 这里的解码逻辑必须和 Python 端严格对应
          return JSON.parse(decodeURIComponent(atob(b64).split('').map(c => 
            '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
          ).join('')));
        } catch (e) { console.error("解析包裹失败"); }
      }
      return { data: { text: "等待 Dify 接入数据..." } };
    }

    const mindMap = new MindMap({
      el: document.getElementById('mindMapContainer'),
      data: getDifyData(),
      theme: 'dark', // 默认黑色背景，比较高级
      readonly: false, // 允许你编辑
      enableDirectEdit: true // 双击节点改字
    });
    window.addEventListener('resize', () => mindMap.resize());
  </script>
</body>
</html>
